spring:
  application:
    name: ex5
  datasource:
    url: jdbc:postgresql://localhost:5432/mybatis
    username: postgres
    password: trung@123
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true     # for existing databases
    out-of-order: false           # reject out-of-order migrations
    validate-on-migrate: true     # checksum validation
    table: flyway_schema_history  # metadata table name
    placeholders:
      schema: public               # use ${schema} in SQL files

  servlet:
    multipart:
      max-request-size: 100MB
      max-file-size: 100MB


mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: fa.training.ex5.entity
  type-handlers-package: fa.training.ex5.typehandler # Added to handler
  configuration:
    map-underscore-to-camel-case: true

springdoc:
  api-docs:
    path: /api-docs

jwt:
  secret: ${SECRET_KEY:default_secret_key}  # Use environment variable or default value

logging:
  level:
    org.springframework.security : TRACE